name: Desktop build

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-24.04
            artifact-name: clawpet-linux
            artifact-path: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm
              src-tauri/target/release/bundle/appimage/*.AppImage
          - platform: windows
            os: windows-latest
            artifact-name: clawpet-windows
            artifact-path: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          - platform: macos
            os: macos-latest
            artifact-name: clawpet-macos
            artifact-path: |
              src-tauri/target/release/bundle/dmg/*.dmg
              src-tauri/target/release/bundle/macos/*.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive release metadata
        id: release_meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
            echo "tag_name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
            echo "tag_name=" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Test
        run: npm test

      - name: Build desktop bundles
        run: npm exec tauri build

      - name: Import Windows signing certificate
        if: matrix.platform == 'windows' && secrets.WINDOWS_SIGN_CERT_BASE64 != '' && secrets.WINDOWS_SIGN_CERT_PASSWORD != ''
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP 'clawpet-codesign.pfx'
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String('${{ secrets.WINDOWS_SIGN_CERT_BASE64 }}'))
          "WINDOWS_SIGN_CERT_PATH=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Sign Windows bundles
        if: matrix.platform == 'windows' && env.WINDOWS_SIGN_CERT_PATH != ''
        shell: pwsh
        run: |
          $timestamp = if ('${{ secrets.WINDOWS_SIGN_TIMESTAMP_URL }}') { '${{ secrets.WINDOWS_SIGN_TIMESTAMP_URL }}' } else { 'http://timestamp.digicert.com' }
          $files = @(
            Get-ChildItem 'src-tauri/target/release/bundle/msi/*.msi' -ErrorAction SilentlyContinue
            Get-ChildItem 'src-tauri/target/release/bundle/nsis/*.exe' -ErrorAction SilentlyContinue
          ) | Where-Object { $_ -ne $null }
          if (-not $files -or $files.Count -eq 0) {
            throw 'No Windows bundles found to sign.'
          }
          foreach ($file in $files) {
            Write-Host "Signing $($file.FullName)"
            & signtool sign /fd SHA256 /td SHA256 /tr $timestamp /f $env:WINDOWS_SIGN_CERT_PATH /p '${{ secrets.WINDOWS_SIGN_CERT_PASSWORD }}' $file.FullName
            if ($LASTEXITCODE -ne 0) { throw "signtool failed for $($file.FullName)" }
          }

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

      - name: Upload release assets
        if: steps.release_meta.outputs.is_tag == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          generate_release_notes: true
          files: ${{ matrix.artifact-path }}
